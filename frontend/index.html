<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="mensaje_bienvenida"></h1>
    <form id="loginForm">
        <p>Login</p>
        <label>Usuario:</label>
        <input type="text" id="username" required>

        <br><br>

        <label>Password:</label>
        <input type="password" id="password" required>

        <br><br>

        <button type="submit">Login biométrico</button>
    </form>
    <br><br>
        <form id="registroForm">
             <p>Registro</p>
        <label>Usuario:</label>
        <input type="text" id="usernameRegistro" required>

        <br><br>

        <label>Password:</label>
        <input type="password" id="passwordRegistro" required>

        <br><br>

        <button id="buttonRegistro" type="submit">Registro</button>
    </form>
    
<div id="biometria" style="display:none">
    <div style="position: relative; display: inline-block;">
        <video id="video" width="640" height="480" autoplay></video>
        <canvas id="overlay" width="640" height="480"
                style="position:absolute;top:0;left:0;"></canvas>
    </div>
    <canvas id="canvas" width="640" height="480" style="display:none"></canvas>
    <p id="mensaje"></p>
</div>
    
    <script src="login.js"></script>
</body>
</html>
